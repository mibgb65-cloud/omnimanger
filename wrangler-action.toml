name = "${NAME}"
main = "src/index.js"
compatibility_date = "2026-06-18"
workers_dev = true
keep_vars = true

[observability]
enabled = true

[[routes]]
pattern = "${CUSTOM_DOMAIN}"
custom_domain = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "VAULT"
id = "${KV_NAMESPACE_ID}"

[vars]
ADMIN_EMAIL = "${ADMIN_EMAIL}"
