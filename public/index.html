<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Secret Vault</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"></path>
        <path d="m9 12 2 2 4-4"></path>
      </symbol>
      <symbol id="icon-lock" viewBox="0 0 24 24">
        <rect width="18" height="11" x="3" y="11" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </symbol>
      <symbol id="icon-unlock" viewBox="0 0 24 24">
        <rect width="18" height="11" x="3" y="11" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 9.6-2"></path>
      </symbol>
      <symbol id="icon-user" viewBox="0 0 24 24">
        <path d="M19 21a7 7 0 0 0-14 0"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </symbol>
      <symbol id="icon-user-plus" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M19 8v6"></path>
        <path d="M22 11h-6"></path>
      </symbol>
      <symbol id="icon-log-in" viewBox="0 0 24 24">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
        <path d="m10 17 5-5-5-5"></path>
        <path d="M15 12H3"></path>
      </symbol>
      <symbol id="icon-log-out" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <path d="m16 17 5-5-5-5"></path>
        <path d="M21 12H9"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
        <path d="M12 5v14"></path>
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </symbol>
      <symbol id="icon-key" viewBox="0 0 24 24">
        <circle cx="7.5" cy="15.5" r="5.5"></circle>
        <path d="m12 11 8-8"></path>
        <path d="m15 8 3 3"></path>
        <path d="m17 6 3 3"></path>
      </symbol>
      <symbol id="icon-mail" viewBox="0 0 24 24">
        <rect width="20" height="16" x="2" y="4" rx="2"></rect>
        <path d="m22 7-10 6L2 7"></path>
      </symbol>
      <symbol id="icon-phone" viewBox="0 0 24 24">
        <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"></path>
      </symbol>
      <symbol id="icon-tags" viewBox="0 0 24 24">
        <path d="m15 5 6.3 6.3a2.4 2.4 0 0 1 0 3.4l-6.6 6.6a2.4 2.4 0 0 1-3.4 0L5 15V5h10Z"></path>
        <path d="M9 9h.01"></path>
      </symbol>
      <symbol id="icon-eye" viewBox="0 0 24 24">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </symbol>
      <symbol id="icon-eye-off" viewBox="0 0 24 24">
        <path d="m2 2 20 20"></path>
        <path d="M10.6 10.6a3 3 0 0 0 4 4"></path>
        <path d="M9.9 4.2A10.6 10.6 0 0 1 12 4c6.5 0 10 8 10 8a17.3 17.3 0 0 1-3.4 4.7"></path>
        <path d="M6.1 6.1C3.4 7.9 2 12 2 12s3.5 8 10 8a10.4 10.4 0 0 0 5.9-1.9"></path>
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <rect width="14" height="14" x="8" y="8" rx="2"></rect>
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M3 6h18"></path>
        <path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"></path>
        <path d="M19 6 18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
      </symbol>
      <symbol id="icon-cloud-download" viewBox="0 0 24 24">
        <path d="M12 13v8"></path>
        <path d="m8 17 4 4 4-4"></path>
        <path d="M20.4 16.3A4.5 4.5 0 0 0 18 8h-1.3A7 7 0 1 0 4 14.9"></path>
      </symbol>
      <symbol id="icon-save" viewBox="0 0 24 24">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
        <path d="M17 21v-8H7v8"></path>
        <path d="M7 3v5h8"></path>
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7.1 4.2l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z"></path>
      </symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 6v6l4 2"></path>
      </symbol>
      <symbol id="icon-file-key" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path>
        <path d="M14 2v6h6"></path>
        <circle cx="10" cy="15" r="2"></circle>
        <path d="m12 15 3 3"></path>
      </symbol>
      <symbol id="icon-note" viewBox="0 0 24 24">
        <path d="M4 4h16v16H4z"></path>
        <path d="M8 8h8"></path>
        <path d="M8 12h8"></path>
        <path d="M8 16h5"></path>
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="m4.9 4.9 1.4 1.4"></path>
        <path d="m17.7 17.7 1.4 1.4"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="m6.3 17.7-1.4 1.4"></path>
        <path d="m19.1 4.9-1.4 1.4"></path>
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 9 9 0 1 0 20.5 14.5Z"></path>
      </symbol>
    </svg>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-icon">
            <svg class="icon icon-lg"><use href="#icon-shield"></use></svg>
          </span>
          <div>
            <p class="eyebrow">Zero-knowledge vault</p>
            <h1>账号保险箱</h1>
          </div>
        </div>
        <div class="status-strip">
          <span id="lockStatus" class="status-pill">
            <svg class="icon"><use href="#icon-lock"></use></svg>
            <span>Locked</span>
          </span>
          <span id="syncStatus" class="status-pill neutral">
            <svg class="icon"><use href="#icon-user"></use></svg>
            <span>Signed out</span>
          </span>
          <button id="themeToggleButton" class="theme-toggle" type="button" aria-label="切换明暗模式">
            <svg class="icon"><use href="#icon-moon"></use></svg>
            <span>深色</span>
          </button>
        </div>
      </header>

      <section id="lockedView" class="unlock-grid">
        <form id="unlockForm" class="panel unlock-panel" autocomplete="off">
          <div class="panel-heading">
            <h2><svg class="icon"><use href="#icon-lock"></use></svg>登录</h2>
            <span class="muted">Cloudflare KV stores encrypted vaults only</span>
          </div>

          <label>
            <span class="label-text"><svg class="icon"><use href="#icon-mail"></use></svg>邮箱</span>
            <input id="loginEmail" name="email" type="email" autocomplete="username" required>
          </label>

          <label>
            <span class="label-text"><svg class="icon"><use href="#icon-key"></use></svg>密码</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required minlength="10">
          </label>

          <label>
            <span class="label-text"><svg class="icon"><use href="#icon-user-plus"></use></svg>邀请码</span>
            <input id="inviteToken" name="inviteToken" type="text" autocomplete="off" spellcheck="false">
          </label>

          <div class="button-row">
            <button type="submit" class="primary">
              <svg class="icon"><use href="#icon-log-in"></use></svg>
              <span>登录</span>
            </button>
            <button id="registerButton" type="button">
              <svg class="icon"><use href="#icon-user-plus"></use></svg>
              <span>注册</span>
            </button>
          </div>

          <p id="unlockMessage" class="message" role="status"></p>
        </form>

        <aside class="panel facts-panel">
          <div class="fact">
            <strong>登录密码</strong>
            <span>原始密码不上传，也用于浏览器端解密保险箱。</span>
          </div>
          <div class="fact">
            <strong>用户账号</strong>
            <span>每个邮箱对应一个独立的加密保险箱。</span>
          </div>
          <div class="fact">
            <strong>服务器</strong>
            <span>只保存登录校验数据、session 和保险箱密文。</span>
          </div>
          <div class="fact">
            <strong>保险箱</strong>
            <span>邮箱、密码、2FA 种子、恢复码都在浏览器加密。</span>
          </div>
        </aside>
      </section>

      <section id="vaultView" class="vault-grid hidden">
        <aside class="list-panel panel">
          <div class="toolbar">
            <label class="search">
              <span class="label-text"><svg class="icon"><use href="#icon-search"></use></svg>搜索</span>
              <input id="searchInput" type="search" autocomplete="off">
            </label>
            <button id="addEntryButton" type="button" class="icon-button add-button" aria-label="新增账号" title="新增账号">
              <svg class="icon"><use href="#icon-plus"></use></svg>
              <span class="sr-only">新增账号</span>
            </button>
          </div>
          <div id="entryList" class="entry-list" aria-label="账号列表"></div>
        </aside>

        <section class="detail-panel panel">
          <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-copy">
              <span class="section-icon">
                <svg class="icon"><use href="#icon-settings"></use></svg>
              </span>
              <div>
                <strong>管理员设置</strong>
                <span id="adminSettingsStatus" class="muted" role="status" aria-live="polite">注册入口默认关闭</span>
              </div>
            </div>
            <label class="switch-row">
              <span>开放新用户注册</span>
              <input id="registrationOpenToggle" type="checkbox">
            </label>
            <div class="invite-controls">
              <button id="createInviteButton" type="button">
                <svg class="icon"><use href="#icon-user-plus"></use></svg>
                <span>邀请</span>
              </button>
              <input id="inviteLink" type="text" readonly aria-label="邀请链接">
            </div>
          </div>

          <form id="entryForm" autocomplete="off">
            <div class="detail-head">
              <label>
                <span class="label-text"><svg class="icon"><use href="#icon-shield"></use></svg>名称</span>
                <input id="entryName" name="name" required placeholder="Google main">
              </label>
              <button id="deleteEntryButton" type="button" class="danger">
                <svg class="icon"><use href="#icon-trash"></use></svg>
                <span>删除</span>
              </button>
            </div>

            <div class="field-grid">
              <label>
                <span class="label-text"><svg class="icon"><use href="#icon-mail"></use></svg>登录邮箱</span>
                <input id="entryLogin" name="login" inputmode="email" autocomplete="off">
              </label>

              <label>
                <span class="label-text"><svg class="icon"><use href="#icon-mail"></use></svg>备用邮箱</span>
                <input id="entryBackupEmail" name="backupEmail" inputmode="email" autocomplete="off">
              </label>

              <label>
                <span class="label-text"><svg class="icon"><use href="#icon-phone"></use></svg>备用手机</span>
                <input id="entryBackupPhone" name="backupPhone" inputmode="tel" autocomplete="off">
              </label>

              <label>
                <span class="label-text"><svg class="icon"><use href="#icon-tags"></use></svg>标签</span>
                <input id="entryTags" name="tags" autocomplete="off" placeholder="work, personal">
              </label>
            </div>

            <label class="secret-row">
              <span class="label-text"><svg class="icon"><use href="#icon-key"></use></svg>密码</span>
              <div class="secret-control">
                <input id="entryPassword" name="password" type="password" autocomplete="new-password">
                <button id="generatePasswordButton" type="button">
                  <svg class="icon"><use href="#icon-key"></use></svg>
                  <span>生成</span>
                </button>
                <button id="togglePasswordButton" type="button" aria-label="显示或隐藏密码">
                  <svg class="icon"><use href="#icon-eye"></use></svg>
                  <span>显示</span>
                </button>
                <button data-copy="entryPassword" type="button">
                  <svg class="icon"><use href="#icon-copy"></use></svg>
                  <span>复制</span>
                </button>
              </div>
              <span id="passwordStrength" class="password-strength" data-level="empty">未填写密码</span>
            </label>

            <label class="secret-row">
              <span class="label-text"><svg class="icon"><use href="#icon-key"></use></svg>2FA TOTP 种子</span>
              <div class="secret-control">
                <input id="entryTotpSecret" name="totpSecret" type="password" autocomplete="off" spellcheck="false">
                <button id="toggleTotpButton" type="button" aria-label="显示或隐藏 2FA 种子">
                  <svg class="icon"><use href="#icon-eye"></use></svg>
                  <span>显示</span>
                </button>
                <button data-copy="entryTotpSecret" type="button">
                  <svg class="icon"><use href="#icon-copy"></use></svg>
                  <span>复制</span>
                </button>
              </div>
            </label>

            <div class="totp-panel">
              <span class="muted label-text"><svg class="icon"><use href="#icon-clock"></use></svg>当前验证码</span>
              <strong id="totpCode">------</strong>
              <div class="timer">
                <span id="totpTimerBar"></span>
              </div>
            </div>

            <label>
              <span class="label-text"><svg class="icon"><use href="#icon-file-key"></use></svg>恢复码</span>
              <textarea id="entryRecoveryCodes" name="recoveryCodes" rows="5" spellcheck="false"></textarea>
            </label>

            <label>
              <span class="label-text"><svg class="icon"><use href="#icon-note"></use></svg>备注</span>
              <textarea id="entryNotes" name="notes" rows="6"></textarea>
            </label>
          </form>

          <div class="bottom-bar">
            <span id="saveStatus" class="muted" role="status" aria-live="polite">未解锁</span>
            <div class="button-row">
              <label class="compact-control">
                <span>自动锁定</span>
                <select id="autoLockSelect">
                  <option value="1">1 分钟</option>
                  <option value="5">5 分钟</option>
                  <option value="15">15 分钟</option>
                  <option value="0">关闭</option>
                </select>
              </label>
              <label class="compact-check">
                <input id="localCacheToggle" type="checkbox">
                <span>本地缓存</span>
              </label>
              <input id="importFileInput" class="sr-only" type="file" accept="application/json">
              <button id="importButton" type="button">
                <svg class="icon"><use href="#icon-cloud-download"></use></svg>
                <span>导入</span>
              </button>
              <button id="exportButton" type="button">
                <svg class="icon"><use href="#icon-save"></use></svg>
                <span>导出</span>
              </button>
              <button id="changePasswordButton" type="button">
                <svg class="icon"><use href="#icon-key"></use></svg>
                <span>改密</span>
              </button>
              <button id="pullButton" type="button">
                <svg class="icon"><use href="#icon-cloud-download"></use></svg>
                <span>拉取</span>
              </button>
              <button id="saveButton" type="button" class="primary">
                <svg class="icon"><use href="#icon-save"></use></svg>
                <span>保存</span>
              </button>
              <button id="lockButton" type="button">
                <svg class="icon"><use href="#icon-log-out"></use></svg>
                <span>退出</span>
              </button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <template id="entryTemplate">
      <button class="entry-item" type="button">
        <span class="entry-icon">
          <svg class="icon"><use href="#icon-key"></use></svg>
        </span>
        <span class="entry-copy">
          <strong></strong>
          <span class="entry-meta"></span>
        </span>
      </button>
    </template>

    <dialog id="appDialog" class="app-dialog" aria-labelledby="appDialogTitle" aria-describedby="appDialogMessage">
      <form id="appDialogForm" novalidate>
        <div class="dialog-head">
          <span id="appDialogIcon" class="section-icon">
            <svg class="icon"><use href="#icon-shield"></use></svg>
          </span>
          <div>
            <h2 id="appDialogTitle">确认操作</h2>
            <p id="appDialogMessage" class="muted"></p>
          </div>
        </div>
        <div id="appDialogFields" class="dialog-fields"></div>
        <p id="appDialogError" class="dialog-error" role="alert" aria-live="assertive"></p>
        <div class="dialog-actions">
          <button id="appDialogCancel" type="button">取消</button>
          <button id="appDialogConfirm" type="submit" class="primary">确认</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
