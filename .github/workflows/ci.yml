name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip playwright
      - run: python -m playwright install --with-deps chromium
      - name: Write local Worker vars
        run: |
          cat > .dev.vars <<'EOF'
          SESSION_SECRET=ci-session-secret-that-is-long-enough
          AUTH_PEPPER=ci-auth-pepper-that-is-long-enough
          ADMIN_EMAIL=admin@example.com
          EOF
      - name: Start local Worker
        run: npx --yes wrangler@latest dev --config wrangler-dev.toml > wrangler.log 2>&1 &
      - name: Wait for local Worker
        run: |
          python - <<'PY'
          import time
          from urllib.request import urlopen

          for _ in range(60):
              try:
                  with urlopen("http://127.0.0.1:8787", timeout=2) as response:
                      if response.status < 500:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("local Worker did not become ready")
          PY
      - run: npm run predeploy
