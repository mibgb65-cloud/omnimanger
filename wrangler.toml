name = "account-secret-vault"
main = "src/index.js"
compatibility_date = "2026-06-18"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "VAULT"
# Replace this with the id returned by: wrangler kv namespace create VAULT
id = "00000000000000000000000000000000"
